<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="../assets/images/logo.png" alt="Logo">
            </div>
            <nav class="sidebar-nav">
                <a href="pos.html">POS System</a>
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="inventory_management.html">Inventory</a>
                <a href="sales_history.html">Sales</a>
                <a href="staff_management.html">Staff</a>
                <a href="reports.html">Reports</a>
                <!-- Add other links like Sales, Staff, etc. here -->
            </nav>
            <footer class="sidebar-footer">
                <div class="user-info">
                    <span>Logged in as:</span>
                    <span id="user-name"></span>
                </div>
                <button id="logout-btn">Logout</button>
            </footer>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1>Dashboard</h1>
            </header>

            <div class="dashboard-grid">
                <<a href="low_stock_report.html" class="stat-card-link">
                  <div class="stat-card">
                      <h3>Low Stock Items</h3>
                      <p class="value" id="low-stock-count">0</p>
                  </div>
                </a>
                <div class="stat-card">
                    <h3>Low Stock Items</h3>
                    <p class="value" id="low-stock-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>Top Selling Products</h3>
                    <ul id="top-sellers-list">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/mockData.js"></script>
    <script src="js/modules/dashboard.js"></script>
</body>
</html>
