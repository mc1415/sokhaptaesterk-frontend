<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/pos.css"> <!-- We will create this new CSS file -->
</head>
<body>
    <div class="pos-layout">
        <!-- Left Panel: Product Selection -->
        <div class="pos-products">
            <header class="pos-header">
                <a href="dashboard.html" class="back-link">← Back to Dashboard</a>
                <input type="text" id="product-search" placeholder="Search products by name or SKU...">
                <div id="currency-switcher-container" style="margin-left: auto;"></div>
            </header>
            <div class="product-grid" id="product-grid">
                <!-- Product tiles will be inserted here by JS -->
            </div>
        </div>

        <!-- Right Panel: Cart & Payment -->
        <div class="pos-cart">
            <div class="cart-header">
                <h2>Current Sale</h2>
                <div class="user-info">
                    Cashier: <span id="user-name"></span>
                </div>
            </div>
            <div class="cart-items" id="cart-items">
                <p class="empty-cart-message">Cart is empty</p>
                <!-- Cart items will be inserted here by JS -->
            </div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (0%)</span>
                    <span id="summary-tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="summary-total">$0.00</span>
                </div>
            </div>
            <div class="cart-actions">
                <button class="btn btn-danger" id="cancel-sale-btn">Cancel Sale</button>
                <button class="btn btn-primary" id="charge-btn" disabled>Charge</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="payment-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Complete Payment</h2>
                <span class="close-btn">×</span>
            </div>
            <div class="payment-details">
                <p class="total-due">Total Due: <span id="payment-total-due">$0.00</span></p>
                <div class="form-group">
                    <label for="payment-method">Payment Method</label>
                    <select id="payment-method">
                        <option value="cash">Cash</option>
                        <option value="card">Credit/Debit Card</option>
                        <option value="mobile">Mobile Payment</option>
                    </select>
                </div>
                <button id="confirm-payment-btn" class="btn btn-dark" style="width:100%;">Confirm Payment & New Sale</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/apiService.js"></script>
    <script src="js/modules/pos.js"></script>
</body>
</html>
