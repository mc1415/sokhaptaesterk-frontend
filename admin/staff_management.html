<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management - Admin Panel</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header"><img src="../assets/images/logo.png" alt="Logo"></div>
            <nav class="sidebar-nav">
                <a href="pos.html">POS System</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="inventory_management.html">Inventory</a>
                <a href="sales_history.html">Sales</a>
                <a href="staff_management.html" class="active">Staff</a>
                <a href="reports.html">Reports</a>
                <!-- Add Sales History link here later -->
            </nav>
            <footer class="sidebar-footer">
                <div class="user-info"><span>Logged in as:</span><span id="user-name"></span></div>
                <button id="logout-btn">Logout</button>
            </footer>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <h1>Staff Management</h1>
                <button class="btn btn-primary" id="add-staff-btn">Add New Staff</button>
            </header>

            <div class="content-card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="staff-table-body">
                        <!-- Rows will be inserted by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add/Edit Staff Modal (Simplified for prototype) -->
    <div id="staff-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="staff-modal-title">Add New Staff</h2>
                <span class="close-btn">×</span>
            </div>
            <form id="staff-form">
                <input type="hidden" id="staff-id">
                <div class="form-group">
                    <label for="staff-name">Full Name</label>
                    <input type="text" id="staff-name" required>
                </div>
                <div class="form-group">
                    <label for="staff-email">Email</label>
                    <input type="email" id="staff-email" required>
                </div>
                <div class="form-group">
                    <label for="staff-role">Role</label>
                    <select id="staff-role" required>
                        <option value="cashier">Cashier</option>
                        <option value="inventory_clerk">Inventory Clerk</option>
                        <option value="manager">Manager</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-dark">Save Staff Member</button>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js"></script>
    <script src="js/apiService.js"></script>
    <script src="js/modules/staff.js"></script>
</body>
</html>
